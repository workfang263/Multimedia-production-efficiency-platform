# Nginx：对外统一 80 端口
# - 静态文件：由 Vue build 的 dist 挂载到 /usr/share/nginx/html
# - /api：反代到同一 Docker 网络内的 api-gateway:18083（容器间用服务名通信，不要用 127.0.0.1）

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API：与网关路由前缀保持一致。若你的 Express 只挂在根路径、没有 /api，请改为 proxy_pass http://api-gateway:18083;
    location /api/ {
        proxy_pass http://api-gateway:18083/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 网关上的静态目录（与 api-gateway express.static 一致）；不反代则 Nginx 会 try_files 到 SPA，图片请求错成 HTML
    location /temp/ {
        proxy_pass http://api-gateway:18083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /uploads/ {
        proxy_pass http://api-gateway:18083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue history 模式：找不到静态文件时回退到 index.html，由前端路由接管
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 100m;
}
