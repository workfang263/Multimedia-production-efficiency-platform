# 为何用 Compose：一条命令定义「数据库 + 多个应用 + 反向代理」的依赖与网络，避免手动记端口与启动顺序。
# 服务间访问：用服务名（如 mysql、api-gateway）作主机名，这是 Docker 内置 DNS 提供的。

services:
  mysql:
    image: mysql:8.0
    # 与运维文档、docker exec 口径统一为容器名 mysql（数据仍在卷 mysql_data，非整库迁移）
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ronghe}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      # 等 MySQL 可接受连接后再启动依赖它的应用，避免启动瞬间连库失败
      # $$ 在 Compose 里转义为 $，密码由容器内环境变量提供，避免特殊字符在 YAML 里被误解析
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  api-gateway:
    build: ./api-gateway
    container_name: ronghe-api-gateway
    restart: unless-stopped
    # 将项目根目录 .env 注入网关，避免仅依赖 Compose 插值时 CORS_EXTRA_ORIGINS 为空覆盖掉白名单
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "18083"
      # 容器内不能用 localhost 访问其它服务，必须用 Compose 服务名
      VIDEO_GENERATION_URL: http://video-service:18091
      # CORS_EXTRA_ORIGINS 由上方 env_file 的 .env 提供；勿在此处写空值，否则会覆盖 env_file
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:18080}
      # 在宿主机创建 .env 后，可按需在网关代码中读取下列变量名（请与你的 ORM/配置对齐后取消注释）
      # DB_HOST: mysql
      # DB_PORT: "3306"
      # DB_USER: root
      # DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # DB_NAME: ${MYSQL_DATABASE:-ronghe}
    depends_on:
      mysql:
        condition: service_healthy
      video-service:
        condition: service_started
    expose:
      - "18083"
    volumes:
      # 与 video-service 共享：拼图 stitch 需读取 fetch-image 写入的 /app/public/temp
      - shared_gateway_temp:/app/public/temp

  video-service:
    build: ./video-service
    container_name: ronghe-video-service
    restart: unless-stopped
    environment:
      PORT: "18091"
      # 与 api-gateway 的 public/temp 同卷，否则 stitch 在容器内找不到网关下载的图片
      STITCH_TEMP_DIR: /app/public/temp
    volumes:
      - shared_gateway_temp:/app/public/temp
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "18091"

  # M2.5 正式图床后端：tuchuang-backend（内网服务，不暴露宿主机端口）
  tuchuang-backend:
    build: ../tuchuang-backend
    container_name: ronghe-tuchuang-backend
    restart: unless-stopped
    # 当前部署方式使用同机源码构建；图床私密配置仍由图床仓库自己的 .env 提供
    env_file:
      - ../tuchuang-backend/.env
    environment:
      # 强制端口为 3001，便于网关通过服务名稳定访问
      PORT: "3001"
    healthcheck:
      # 用 node 发起本机探活（镜像为 node:alpine，无需依赖 wget/curl）
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.get('http://127.0.0.1:3001/health',res=>{let d='';res.on('data',c=>d+=c);res.on('end',()=>{try{const j=JSON.parse(d);process.exit(res.statusCode===200&&j&&j.ok===true?0:1)}catch(e){process.exit(1)}})});req.on('error',()=>process.exit(1));\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    container_name: ronghe-nginx
    restart: unless-stopped
    environment:
      # 生产建议设置为公网可达地址；本地 Docker on Linux 可使用 host.docker.internal
      PRODUCT_TABLE_UPSTREAM: ${PRODUCT_TABLE_UPSTREAM:-http://host.docker.internal:5001/}
    # 宿主机 8081 → 容器内 80（宿主 80 可留给其他项目）；访问 http://宿主IP:8081
    ports:
      - "8081:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api-gateway
    # 默认网络保留与 api-gateway 等同栈服务互联；app-network 供后续 oauth2-proxy、fb-ad-nginx 等同名 DNS
    networks:
      - default
      - app-network

  # 认证层骨架：先接入编排与网络，真实密钥在后续里程碑补齐后再启用 profile=auth。
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    profiles: ["auth"]
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --provider=oidc
      - --oidc-issuer-url=${DINGTALK_OIDC_ISSUER_URL:-https://placeholder.invalid}
      - --redirect-url=${OAUTH2_PROXY_REDIRECT_URL:-http://ad_tools.thinkpro.top/oauth2/callback}
      - --upstream=file:///dev/null
      - --email-domain=*
      - --cookie-domain=.thinkpro.top
      - --cookie-secure=false
      - --set-xauthrequest=true
      - --pass-user-headers=true
      - --pass-authorization-header=true
      - --skip-provider-button=true
    environment:
      # 暂无钉钉密钥时保留占位，避免误启动后把入口锁死；启用前务必替换为真实值。
      OAUTH2_PROXY_CLIENT_ID: ${DINGTALK_APP_KEY:-__TO_BE_FILLED__}
      OAUTH2_PROXY_CLIENT_SECRET: ${DINGTALK_APP_SECRET:-__TO_BE_FILLED__}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-__TO_BE_FILLED__}
    expose:
      - "4180"
    networks:
      - app-network

volumes:
  mysql_data:
  shared_gateway_temp:

# 外部预创建：docker network create app-network（Compose 只声明接入，避免隐式重名网络）
networks:
  app-network:
    external: true
